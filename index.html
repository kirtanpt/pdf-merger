<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Merger & Page Sorter</title>

  <!-- PDF.js for rendering previews -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <!-- pdf-lib for merging PDFs entirely in the browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <!-- SortableJS for drag-and-drop -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

  <style>
    /* ── Reset & Variables ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --border:    #2a2d3a;
      --accent:    #6366f1;
      --accent-h:  #818cf8;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --danger:    #ef4444;
      --success:   #22c55e;
      --radius:    12px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header h1 span { font-weight: 400; opacity: .7; }

    .header-actions { display: flex; gap: .75rem; flex-wrap: wrap; }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: .5rem;
      padding: .65rem 1.25rem;
      border: none; border-radius: 8px;
      font-size: .875rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }

    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { background: var(--accent-h); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .4; pointer-events: none; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--text); }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
    }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* ── Main Layout ────────────────────────────────────────────────── */
    main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* ── Upload Zone ────────────────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all .3s;
      background: var(--surface);
      position: relative;
    }

    .upload-zone:hover,
    .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(99,102,241,.06);
    }

    .upload-zone svg { width: 48px; height: 48px; margin-bottom: 1rem; color: var(--accent); }

    .upload-zone h2 { font-size: 1.15rem; margin-bottom: .5rem; }
    .upload-zone p  { color: var(--text-dim); font-size: .875rem; }

    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin: 1.5rem 0 1rem; flex-wrap: wrap; gap: .75rem;
    }

    .page-count { font-size: .9rem; color: var(--text-dim); }
    .page-count strong { color: var(--text); }

    /* ── Page Grid ──────────────────────────────────────────────────── */
    #page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }

    .page-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: grab;
      transition: all .2s;
      position: relative;
    }

    .page-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .page-card.sortable-chosen { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.25); }
    .page-card.sortable-ghost  { opacity: .3; }

    .page-card .preview {
      width: 100%; aspect-ratio: 3/4;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .page-card .preview canvas {
      width: 100%; height: 100%; object-fit: contain;
    }

    .page-card .info {
      padding: .6rem .75rem;
      display: flex; align-items: center; justify-content: space-between;
    }

    .page-card .info .label {
      font-size: .75rem; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 110px;
    }

    .page-card .page-number {
      font-size: .7rem; font-weight: 700;
      background: var(--accent); color: #fff;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; flex-shrink: 0;
    }

    .page-card .remove-btn {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,.6); border: none;
      color: #fff; width: 24px; height: 24px;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s; font-size: .8rem;
    }

    .page-card:hover .remove-btn { opacity: 1; }
    .page-card .remove-btn:hover { background: var(--danger); }

    /* ── Spinner ──────────────────────────────────────────────────── */
    .spinner {
      display: none; align-items: center; justify-content: center;
      gap: .75rem; padding: 2rem; color: var(--text-dim);
    }
    .spinner.show { display: flex; }

    .spinner .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--accent); animation: bounce 1.4s infinite ease-in-out;
    }
    .spinner .dot:nth-child(2) { animation-delay: .16s; }
    .spinner .dot:nth-child(3) { animation-delay: .32s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* ── Toast ───────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: .85rem 1.25rem;
      display: flex; align-items: center; gap: .6rem;
      font-size: .875rem; box-shadow: 0 8px 24px rgba(0,0,0,.4);
      transform: translateY(120%); transition: transform .3s;
      z-index: 1000;
    }
    .toast.show { transform: translateY(0); }
    .toast.success { border-color: var(--success); }
    .toast.error   { border-color: var(--danger); }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>📄 PDF Merger <span>& Page Sorter</span></h1>
  <div class="header-actions">
    <button class="btn btn-outline" id="btn-add-more" style="display:none" onclick="document.getElementById('file-input-extra').click()">
      ＋ Add More PDFs
    </button>
    <button class="btn btn-danger" id="btn-reset" style="display:none" onclick="resetAll()">
      ✕ Reset
    </button>
    <button class="btn btn-primary" id="btn-merge" disabled onclick="mergePDF()">
      ⬇ Merge &amp; Download
    </button>
    <input type="file" id="file-input-extra" accept=".pdf" multiple hidden />
  </div>
</header>

<main>
  <!-- Upload Area -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept=".pdf" multiple />
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M12 16.5V9.75m0 0 3 3m-3-3-3 3M6.75 19.5a4.5 4.5 0 0 1-1.41-8.775
           5.25 5.25 0 0 1 10.233-2.33 3 3 0 0 1 3.758 3.848A3.752 3.752 0 0 1
           18 19.5H6.75Z"/>
    </svg>
    <h2>Drop your PDF files here</h2>
    <p>or click to browse &nbsp;·&nbsp; supports multiple files &nbsp;·&nbsp; 100 % client-side, nothing leaves your machine</p>
  </div>

  <!-- Toolbar -->
  <div class="toolbar" id="toolbar" style="display:none">
    <span class="page-count">
      <strong id="total-pages">0</strong> pages from
      <strong id="total-files">0</strong> file(s) — drag to reorder
    </span>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-outline" onclick="reversePages()">↕ Reverse Order</button>
    </div>
  </div>

  <!-- Spinner -->
  <div class="spinner" id="spinner">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    <span id="spinner-text">Processing pages…</span>
  </div>

  <!-- Pages Grid -->
  <div id="page-grid"></div>
</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  // ── PDF.js setup ──────────────────────────────────────────────────
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

  // ── State ─────────────────────────────────────────────────────────
  // Each entry: { id, fileName, pageIndex, label, pdfBytes (ArrayBuffer) }
  let pages = [];
  let fileCount = 0;

  const grid       = document.getElementById("page-grid");
  const spinner    = document.getElementById("spinner");
  const spinnerTxt = document.getElementById("spinner-text");
  const toolbar    = document.getElementById("toolbar");
  const uploadZone = document.getElementById("upload-zone");
  const mergeBtn   = document.getElementById("btn-merge");
  const addMoreBtn = document.getElementById("btn-add-more");
  const resetBtn   = document.getElementById("btn-reset");

  // ── SortableJS ────────────────────────────────────────────────────
  Sortable.create(grid, {
    animation: 200,
    ghostClass: "sortable-ghost",
    chosenClass: "sortable-chosen",
    onEnd() { syncFromDOM(); },
  });

  // ── File Inputs ───────────────────────────────────────────────────
  document.getElementById("file-input").addEventListener("change", e => handleFiles(e.target.files));
  document.getElementById("file-input-extra").addEventListener("change", e => {
    handleFiles(e.target.files);
    e.target.value = "";           // allow re-selecting the same file
  });

  // Drag-over styling
  uploadZone.addEventListener("dragover",  () => uploadZone.classList.add("dragover"));
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
  uploadZone.addEventListener("drop",      () => uploadZone.classList.remove("dragover"));

  // ── Handle Files ──────────────────────────────────────────────────
  async function handleFiles(fileList) {
    if (!fileList.length) return;

    spinner.classList.add("show");
    spinnerTxt.textContent = "Reading PDFs…";

    let addedCount = 0;

    for (const file of fileList) {
      if (file.type !== "application/pdf") continue;

      const arrayBuffer = await file.arrayBuffer();
      const pdfBytes = new Uint8Array(arrayBuffer);

      // Load with PDF.js to get page count + render previews
      const pdf = await pdfjsLib.getDocument({ data: pdfBytes.slice() }).promise;
      const numPages = pdf.numPages;
      fileCount++;

      for (let i = 0; i < numPages; i++) {
        const id = `${file.name}__${i}__${Date.now()}`;
        const entry = {
          id,
          fileName: file.name,
          pageIndex: i,
          label: `${file.name} — Page ${i + 1}`,
          pdfBytes,                // reference to full file bytes
        };

        pages.push(entry);
        addedCount++;

        // Create card
        const card = document.createElement("div");
        card.className = "page-card";
        card.dataset.idx = pages.length - 1;
        card.dataset.id  = id;

        card.innerHTML = `
          <div class="preview"><canvas></canvas></div>
          <div class="info">
            <span class="label" title="${entry.label}">${entry.label}</span>
            <span class="page-number">${pages.length}</span>
          </div>
          <button class="remove-btn" title="Remove page" onclick="removePage(this)">✕</button>
        `;

        grid.appendChild(card);

        // Render thumbnail
        renderThumb(card.querySelector("canvas"), pdf, i + 1);
      }
    }

    spinner.classList.remove("show");
    updateUI();
    toast(`Added ${addedCount} page(s)`, "success");
  }

  // ── Render a single page thumbnail ────────────────────────────────
  async function renderThumb(canvas, pdf, pageNum) {
    try {
      const page = await pdf.getPage(pageNum);
      const vp   = page.getViewport({ scale: 1 });
      const scale = 300 / vp.width;
      const scaled = page.getViewport({ scale });

      canvas.width  = scaled.width;
      canvas.height = scaled.height;

      await page.render({
        canvasContext: canvas.getContext("2d"),
        viewport: scaled,
      }).promise;
    } catch (e) {
      console.error("Render failed", e);
    }
  }

  // ── Remove a page ─────────────────────────────────────────────────
  function removePage(btn) {
    btn.closest(".page-card").remove();
    syncFromDOM();
    updateUI();
  }

  // ── Reverse order ─────────────────────────────────────────────────
  function reversePages() {
    const cards = [...grid.children].reverse();
    grid.innerHTML = "";
    cards.forEach(c => grid.appendChild(c));
    syncFromDOM();
  }

  // ── Sync `pages` array from DOM order ─────────────────────────────
  function syncFromDOM() {
    const cards = grid.querySelectorAll(".page-card");
    const reordered = [];

    cards.forEach((c, i) => {
      const entry = pages.find(p => p.id === c.dataset.id);
      if (entry) {
        reordered.push(entry);
        c.querySelector(".page-number").textContent = i + 1;
      }
    });

    pages = reordered;
    updateUI();
  }

  // ── UI refresh ────────────────────────────────────────────────────
  function updateUI() {
    const hasPages = pages.length > 0;
    toolbar.style.display    = hasPages ? "flex" : "none";
    uploadZone.style.display = hasPages ? "none" : "block";
    addMoreBtn.style.display = hasPages ? "inline-flex" : "none";
    resetBtn.style.display   = hasPages ? "inline-flex" : "none";
    mergeBtn.disabled        = !hasPages;
    document.getElementById("total-pages").textContent = pages.length;
    document.getElementById("total-files").textContent  = fileCount;
  }

  // ── Merge & Download (100 % client-side with pdf-lib) ─────────────
  async function mergePDF() {
    if (!pages.length) return;

    mergeBtn.disabled = true;
    mergeBtn.textContent = "⏳ Merging…";
    spinner.classList.add("show");
    spinnerTxt.textContent = "Merging pages…";

    try {
      const { PDFDocument } = PDFLib;
      const merged = await PDFDocument.create();

      // Cache loaded docs so we don't re-parse the same file
      const docCache = new Map();

      for (const entry of pages) {
        const key = entry.fileName + "__" + entry.pdfBytes.byteLength;
        let srcDoc = docCache.get(key);

        if (!srcDoc) {
          srcDoc = await PDFDocument.load(entry.pdfBytes);
          docCache.set(key, srcDoc);
        }

        const [copiedPage] = await merged.copyPages(srcDoc, [entry.pageIndex]);
        merged.addPage(copiedPage);
      }

      const mergedBytes = await merged.save();

      // Trigger download
      const blob = new Blob([mergedBytes], { type: "application/pdf" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = "merged.pdf";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      toast("PDF merged successfully! 🎉", "success");
    } catch (err) {
      console.error(err);
      toast("Merge failed: " + err.message, "error");
    } finally {
      mergeBtn.disabled = false;
      mergeBtn.innerHTML = "⬇ Merge &amp; Download";
      spinner.classList.remove("show");
    }
  }

  // ── Reset ─────────────────────────────────────────────────────────
  function resetAll() {
    pages = [];
    fileCount = 0;
    grid.innerHTML = "";
    updateUI();
    uploadZone.style.display = "block";
  }

  // ── Toast ─────────────────────────────────────────────────────────
  function toast(msg, type = "success") {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast " + type + " show";
    setTimeout(() => el.classList.remove("show"), 3000);
  }
</script>
</body>
</html>
